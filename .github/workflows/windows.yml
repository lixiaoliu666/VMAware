on:
  push:
    branches:
      - master
  workflow_dispatch: 
"jobs":
  "build_run_win_64_debug":
    "runs-on": "windows-latest"
    "steps":
      - "uses": "actions/checkout@main"
      - "run": "cmd.exe /c .github\\workflows\\build_run_win_64_debug.bat"
      - "uses": "actions/upload-artifact@main"
        "with":
          "path": 
            build\\Debug\\vmaware.exe
            build\\Debug\\ucrtbased.dll
            build\\Debug\\vcruntime140d.dll
            build\\Debug\\msvcp140d.dll
          "name": "vmaware64_debug"
  "build_run_win_64_release":
    "runs-on": "windows-latest"
    "steps":
      - "uses": "actions/checkout@main"
      - "run": "cmd.exe /c .github\\workflows\\build_run_win_64_release.bat"
      - "uses": "actions/upload-artifact@main"
        "with":
          "path": "build\\Release\\vmaware.exe"
          "name": "vmaware64_release"
